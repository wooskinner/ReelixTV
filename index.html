<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=/ReelixTV/tv/">
    <title>Reelix TV</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0D0B14;
            color: #F6F1E9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
        }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(227, 184, 115, 0.15);
            border-top-color: #E3B873;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0;
        }
        p {
            color: #A79BC0;
            margin: 0;
        }
        a {
            color: #E3B873;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h1>Reelix TV</h1>
        <p>Loading TV app...</p>
        <p><small>If you're not redirected automatically, <a href="/ReelixTV/tv/">click here</a>.</small></p>
    </div>
</body>
</html>
